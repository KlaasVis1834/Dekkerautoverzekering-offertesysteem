{% extends "base.html" %}
{% block content %}

<div class="card">
  <h3 style="margin:0">Backup / CSV-export</h3>
  <div class="muted small">
    Exporteer offertes of aanvragen per maand of per week.
  </div>
</div>

<div style="height:14px"></div>

<div class="card">
  <form method="get" action="{{ url_for('export_backup_download') }}" class="grid" style="gap:14px;">

    <div>
      <div class="muted small">Wat wil je exporteren?</div>
      <select name="type">
        <option value="offers">Offertes</option>
        <option value="applications">Aanvragen</option>
      </select>
    </div>

    <div>
      <div class="muted small">Periode</div>
      <select name="period" id="periodSelect" onchange="togglePeriodInput()">
        <option value="month">Per maand</option>
        <option value="week">Per week</option>
      </select>
    </div>

    <div id="monthBox">
      <div class="muted small">Maand</div>
      <input type="month" id="monthInput" value="2026-05">
    </div>

    <div id="weekBox" style="display:none;">
      <div class="muted small">Week</div>
      <input type="week" id="weekInput" value="2026-W20">
    </div>

    <input type="hidden" name="value" id="valueInput" value="2026-05">

    <div class="row">
      <button class="btn ok" type="submit" onclick="setExportValue()">
        Download CSV
      </button>
      <a class="btn" href="{{ url_for('dashboard') }}">Terug</a>
    </div>

  </form>
</div>

<script>
function togglePeriodInput() {
  const period = document.getElementById("periodSelect").value;
  document.getElementById("monthBox").style.display = period === "month" ? "block" : "none";
  document.getElementById("weekBox").style.display = period === "week" ? "block" : "none";
  setExportValue();
}

function setExportValue() {
  const period = document.getElementById("periodSelect").value;
  const valueInput = document.getElementById("valueInput");

  if (period === "month") {
    valueInput.value = document.getElementById("monthInput").value;
  } else {
    valueInput.value = document.getElementById("weekInput").value;
  }
}

document.getElementById("monthInput").addEventListener("change", setExportValue);
document.getElementById("weekInput").addEventListener("change", setExportValue);
togglePeriodInput();
</script>

{% endblock %}
