<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Inloggen | Dekker Offertesysteem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
      padding: 18px;
      box-sizing: border-box;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
      box-sizing: border-box;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .login-logo img {
      max-width: 210px;
      width: 75%;
      height: auto;
      display: inline-block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      text-align: center;
    }

    p {
      margin: 0 0 24px;
      color: #667085;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 10px;
      background: #0b5ed7;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <form class="login-box" method="post">
    <div class="login-logo">
      <img 
        src="{{ url_for('static', filename='logo_klaasvis.png') }}"
        alt="Klaas Vis logo"
      >
    </div>

    <h1>Dekker Offertesysteem</h1>
    <p>Log in om verder te gaan.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="error">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <label>Gebruikersnaam</label>
    <input type="text" name="username" required>

    <label>Wachtwoord</label>
    <input type="password" name="password" required>

    <button type="submit">Inloggen</button>
  </form>

</body>
</html>
