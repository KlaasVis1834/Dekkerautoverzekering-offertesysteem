<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mijn account | Dekker Offertesysteem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .account-box {
      width: 100%;
      max-width: 430px;
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 24px;
      color: #667085;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #d0d5dd;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button, .back-link {
      width: 100%;
      display: block;
      text-align: center;
      padding: 13px;
      border: 0;
      border-radius: 10px;
      background: #0b5ed7;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      box-sizing: border-box;
    }

    .back-link {
      margin-top: 12px;
      background: #475569;
    }

    .message {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <form class="account-box" method="post">
    <h1>Mijn account</h1>
    <p>
      Ingelogd als:
      <strong>{{ session.get("display_name") or session.get("username") }}</strong>
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="message {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <label>Huidig wachtwoord</label>
    <input type="password" name="current_password" required>

    <label>Nieuw wachtwoord</label>
    <input type="password" name="new_password" required>

    <label>Herhaal nieuw wachtwoord</label>
    <input type="password" name="confirm_password" required>

    <button type="submit">Wachtwoord wijzigen</button>

    <a href="{{ url_for('dashboard') }}" class="back-link">Terug naar dashboard</a>
  </form>
</body>
</html>
